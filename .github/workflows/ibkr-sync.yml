name: IBKR Daily Sync

on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 daily = HK 06:00 AM
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  pages: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run IBKR Sync
        env:
          IBKR_TOKEN: ${{ secrets.IBKR_TOKEN }}
          IBKR_QUERY_ID: ${{ secrets.IBKR_QUERY_ID }}
        run: node sync_ibkr_ci.mjs

      - name: Push updated data
        run: |
          git config user.name "IBKR Sync Bot"
          git config user.email "bot@banking.local"
          git add ibkr_parsed.json src/data/ibkr_parsed.json
          git diff --cached --quiet || git commit -m "Auto-sync IBKR data $(date -u +%Y-%m-%d)"
          git push

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        run: npx vite build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
