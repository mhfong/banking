name: IBKR Daily Sync

on:
  schedule:
    - cron: '0 21 * * 1-5'  # UTC 21:00 Mon-Fri = HK 05:00 AM
  workflow_dispatch:  # Manual trigger button

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run IBKR Sync
        env:
          IBKR_TOKEN: ${{ secrets.IBKR_TOKEN }}
          IBKR_QUERY_ID: ${{ secrets.IBKR_QUERY_ID }}
        run: node sync_ibkr_ci.mjs

      - name: Build
        run: npx vite build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
